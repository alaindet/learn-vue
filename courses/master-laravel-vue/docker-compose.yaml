version: '3.8'

services:

  server:
    image: nginx:1.21.4-alpine
    ports:
      - '8000:80'
    volumes:
      - ./app:/var/www/html
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
      - mariadb

  php:
    build:
      context: ./dockerfiles
      dockerfile: php.dockerfile
    env_file:
      - ./env/php.env
    volumes:
      - ./app:/var/www/html
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:10.7
    working_dir: /application
    volumes:
      - db_data:/var/lib/mysql
    env_file:
      - ./env/mariadb.env
    ports:
      - '3306:3306'

  composer:
    build:
      context: ./dockerfiles
      dockerfile: composer.dockerfile
    volumes:
      - ./app:/home/laravel/app

  artisan:
    build:
      context: ./dockerfiles
      dockerfile: php.dockerfile
    volumes:
      - ./app:/var/www/html
    entrypoint: ['php', '/var/www/html/artisan']

  adminer:
    image: adminer:4.8.0
    ports:
      - '8081:8080'
    depends_on:
      - mariadb

volumes:
  db_data: {}
